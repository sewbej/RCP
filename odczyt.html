<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RCP - Podgląd Godzin</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 5px; max-width: 600px; margin: auto; background-color: #ffffff; }
        .card { background: white; padding: 6px; border-radius: 12px; box-shadow: 0 0 1px 1px rgba(0,0,0,0.6); }
        
        label { display: block; margin-top: 6px; font-weight: bold; color: #000000; }
        input, select { width: 100%; padding: 6px; margin-top: 2px; border: 1px solid #000000; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        
        button { width: 100%; padding: 5px; background-color: #fff; color: #000; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; margin-top: 15px; cursor: pointer; transition: 0.2s; box-shadow: 0 0 1px 1px rgba(0,0,0,0.6);}
        button:hover { background-color: #000; color: #fff; }
        button:active { transform: scale(0.98); background-color: #1557b0; }
        button:disabled { background-color: #ccc; }

        #loader { display: none; text-align: center; margin-top: 20px; color: #000; font-weight: bold; }
        
        .results-container { margin-top: 5px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; font-size: 18px; }
        th { background-color: #ffffff; color: #000000; font-weight: bold; padding-top: 6px; border-bottom: 1px solid #888; text-align: center; }
        td { padding: 2px; border-bottom: 1px solid #888; color: #333; text-align: center;}
        tr:last-child td { border-bottom: none; }
        .no-data { text-align: center; padding: 20px; color: #999; }
    </style>
</head>
<body>

    <div class="card">
        
        
        <label>Imię i Nazwisko</label>
        <input type="text" id="nameInput" placeholder="Wpisz imię i nazwisko">

        <div style="display: flex; gap: 8px;">
            <div style="flex: 2;">
                <label>Miesiąc</label>
                <select id="monthSelect">
                    <option value="Styczeń">Styczeń</option><option value="Luty">Luty</option>
                    <option value="Marzec">Marzec</option><option value="Kwiecień">Kwiecień</option>
                    <option value="Maj">Maj</option><option value="Czerwiec">Czerwiec</option>
                    <option value="Lipiec">Lipiec</option><option value="Sierpień">Sierpień</option>
                    <option value="Wrzesień">Wrzesień</option><option value="Październik">Październik</option>
                    <option value="Listopad">Listopad</option><option value="Grudzień">Grudzień</option>
                </select>
            </div>
            <div style="flex: 1;">
                <label>Rok</label>
                <input type="number" id="yearInput">
            </div>
        </div>

        <button id="fetchBtn" onclick="getWorkHistory()">GODZINY PRACY</button>
        
        <div id="loader">Pobieranie danych...</div>

        <div id="results" class="results-container">
            <!-- Tutaj wpadnie tabela -->
        </div>
    </div>

    <script>
        // --- TU WKLEJ SWÓJ LINK DO GOOGLE SCRIPT ---
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyfA6Ia_OP-gA1t5-COIvBSXN5IKrO3T9nFOQlY3z3zjg7j5iW4cFE9eOKqRILWfok/exec";

        // Ustawienie domyślnego roku i miesiąca na dzisiaj
        const now = new Date();
        const monthNames = ["Styczeń", "Luty", "Marzec", "Kwiecień", "Maj", "Czerwiec", "Lipiec", "Sierpień", "Wrzesień", "Październik", "Listopad", "Grudzień"];
        document.getElementById('yearInput').value = now.getFullYear();
        document.getElementById('monthSelect').value = monthNames[now.getMonth()];

async function getWorkHistory() {
    const name = document.getElementById('nameInput').value.trim();
    const month = document.getElementById('monthSelect').value;
    const year = document.getElementById('yearInput').value;
    const btn = document.getElementById('fetchBtn');
    const loader = document.getElementById('loader');
    const resultsDiv = document.getElementById('results');

    if (!name) {
        alert("Proszę wpisać nazwisko.");
        return;
    }

    btn.disabled = true;
    loader.style.display = "block";
    resultsDiv.innerHTML = "";

    const payload = {
        action: "get_history",
        kod: name,
        miesiac: month,
        rok: year
    };

    try {
        const response = await fetch(GOOGLE_SCRIPT_URL, {
            method: "POST",
            headers: { "Content-Type": "text/plain;charset=utf-8" },
            body: JSON.stringify(payload)
        });
        
        const data = await response.json(); // To są dane z arkusza (tylko te dni, w których był)

        // Tworzymy mapę danych dla szybkiego dostępu: kluczem jest numer dnia
        const dataMap = {};
        data.forEach(item => {
            dataMap[item.dzien] = item;
        });

        // Budujemy tabelę na 31 dni
        let html = `<table>
            <thead>
                <tr>
                    <th style="width: 16px;">dzień</th>
                    <th>rozpoczęcie</th>
                    <th>zakończenie</th>
                    <th>czas pracy</th>
                </tr>
            </thead>
            <tbody>`;
        
        for (let d = 1; d <= 31; d++) {
            if (dataMap[d]) {
                // Jeśli mamy dane dla tego dnia w arkuszu
                html += `<tr>
                    <td style="font-weight: bold; color: #000;">${d}</td>
                    <td>${dataMap[d].rozpoczecie}</td>
                    <td>${dataMap[d].zakonczenie}</td>
                    <td>${dataMap[d].czas}</td>
                </tr>`;
            } else {
                // Jeśli pracownika nie było (pusty wiersz)
                html += `<tr style="color: #000;">
                    <td style="font-weight: normal;">${d}</td>
                    <td>---</td>
                    <td>---</td>
                    <td>---</td>
                </tr>`;
            }
        }

        html += '</tbody></table>';
        resultsDiv.innerHTML = html;

    } catch (error) {
        console.error(error);
        alert("Błąd połączenia. Sprawdź czy GOOGLE_SCRIPT_URL jest poprawny.");
    } finally {
        btn.disabled = false;
        loader.style.display = "none";
    }
}
    </script>
</body>
</html>
